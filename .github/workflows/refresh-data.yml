# ================================================================
# .github/workflows/refresh-data.yml
#
# Automatically refreshes Sleeper data every Monday at 6am ET
# (11:00 UTC) so the website loads from a single cached file.
#
# You can also trigger it manually anytime:
#   GitHub.com → your repo → Actions tab → "Refresh Sleeper Data"
#   → "Run workflow" button on the right
# ================================================================

name: Refresh Sleeper Data

on:
  # Runs every Monday at 11:00 UTC = 6:00am ET (after Sunday games complete)
  schedule:
    - cron: '0 11 * * 1'

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual refresh (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Sleeper data
        run: node scripts/fetch-data.js

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "🏈 Auto-refresh Sleeper data — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ data.json committed and pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
